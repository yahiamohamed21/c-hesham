<!DOCTYPE html>
<head>
    <title>Payments</title>
   
   <style>

*{
        font-family: 'popins',sans-serif;
        margin:0; padding:0;
        box-sizing: border-box;
        outline:none; border:none;
        text-transform: capitalize;
        transition: all .2s linear;
    }

  
.container{
    display:grid;
    justify-content: center;
    align-items: center;
    padding: 25px;
    min-height: 100vh;
    padding-bottom: 70px;
    background-image: url(../offers/payment.jpg) ; 
    background-size: 100% ;
    background-repeat:no-repeat;
    background-position: cover;

 }

  
.container form {
    padding: 62px;
    width: 900px;
    background-color:rgb(255 255 255 / 56%);
    box-shadow:0 5px 10px rgba(0,0,0,.1);
     border-radius: 20px; 
     backdrop-filter: blur(7px);

}

.container form .row{
    width: 100%;
    display: flex; 
    flex-wrap: wrap;
    gap:1px;
} 
.container form .inputbox input{
    padding: 15px 15px;
    height:50%;
 
}
.container .inputbox  input{
    height: 173%;
    width: 73%;
    border: 2px solid rgba(255, 255, 255, .2);
    outline: none;
    font-size: 18px;
    color: rgb(0, 0, 0);
    border-radius: 21px;
    padding: 3px;
    margin-right: -32px;
    margin-top: -7px;
    padding-top: 8px;
    padding-right: 32px;
    box-shadow: 0 0 7px rgba(0,0,0,1); 
    background-color: #c2caad38 ; 

}
.inputbox  input::placeholder{
    color: rgb(7, 6, 6);
    padding: 15px 15px 15px;

}
.container form .row .col1{
    width: 50%;
  }
 .tittle{
    font-size: 20px;
    color: #333;
    padding-bottom: 50px;
    padding-left: 30px;
    text-transform: uppercase;

}

 .inputbox{
    display: flex;
    margin-bottom: 20px;
    margin-right: 20px;
} 


label{
    width: 100px;
    margin-top: 5px;
}

.container .buttom {
    display: grid;
    width: 100%;
    justify-content: center;
    margin-top: 20px;
}
.container .buttom .btn {
    width: 250px;
    height: 50px;

    background-color: #000000;
    border: none;
    outline: none;
    border-radius: 40px;
    text-align: center;
    box-shadow: 0 0 7px rgba(0,0,0,1);
    /* cursor: pointer; */
    font-size: 16px;
    color: #ffffff;
    font-weight: 600;
    transition: .4s ease-in-out;
  
    
}


   </style>
</head>

 
 


<body>
    
<div class="container">
    <form action="">
    <div class="row">
        <div class="col1">

         <h3 class="tittle"> BILLING ADDRESS </h3>
         <div class="inputbox">
            <label>Full Name :</label>
            <input type="text" placeholder="edjjgeg">
         </div>

           
                        <div class="inputbox">
                            <label>Email :</label>
                            <input type="email" placeholder="XX@XXX.Com">
                        </div>
         

         <div class="inputbox">
            <label>Address :</label>
            <input type="text" placeholder="Locality">
         </div>

                        <div class="inputbox">
                            <label>city :</label>
                            <input type="text" placeholder=" Fayoum">
                        </div>

    <div class="flex">
                <div class="inputbox">
                <label>State :</label>
                <input type="text" placeholder="Egypt">
                </div>

                
                <div class="inputbox">
                <label> ZIP Code :</label>
                <input type="number" placeholder="123 456">
                </div>
    </div>
        
        </div>
        
            <div class="col2">

                         <h3 class="tittle">PAYMENT</h3>
        
                        <div class="inputbox">
                        <pre> <label>cards accepted :</label><img src="../offers/card.png"></pre> 
                        </div>
 
                        <div class="inputbox">
                           <label> Name on card :</label>
                           <input type="text" placeholder="Yahia mohamed">
                        </div>
                        
                        
                        <div class="inputbox"> 
                           <label>Credit Card No :</label>
                           <input type="number" placeholder="XXXX-XXXX-XXXX-XXXX">
                        </div>
                
                                       <div class="inputbox">
                                           <label>exp month :</label>
                                           <input type="number" placeholder="1" min="1" max="12" >
                                       </div>
               
              <div class="flex"> 
                            <div class="inputbox">
                                <label>exp year :</label>
                                <input type="number" placeholder="2000"  min="2000" max="2024">
                            </div>
                        <div class="inputbox">
                            <label> CVV :</label>
                            <input type="number" placeholder="1234">
                        </div>
            </div>
        
        </div>
       
    </div>
    <div class="buttom">
        <input class="btn" type="submit" value="proceed To checout"> 
    </div>
   

</form>


</div>



</body>
</html>
